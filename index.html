<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Наш Город</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<style>
body { font-family: Arial; background:#f4f6f9; }
.container { max-width:800px; margin:auto; padding:20px; }
.card { background:white; padding:20px; margin-bottom:20px; }
</style>
</head>

<body>

<div class="container">

<div class="card">
<h2>Оставить жалобу</h2>

<input id="name" placeholder="Имя"><br>
<input id="category" placeholder="Категория"><br>
<textarea id="text" placeholder="Жалоба"></textarea><br>

<button onclick="send()">Отправить</button>
</div>

<div class="card">
<h2>Все жалобы</h2>
<div id="list"></div>
</div>

</div>

<script>
// ВСТАВЬ СЮДА СВОЙ firebaseConfig
const firebaseConfig = {
  apiKey: "ТВОЙ",
  authDomain: "ТВОЙ",
  projectId: "ТВОЙ"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function send() {
    db.collection("complaints").add({
        name: document.getElementById("name").value,
        category: document.getElementById("category").value,
        text: document.getElementById("text").value,
        date: new Date()
    });
}

db.collection("complaints")
.onSnapshot(snapshot => {
    let list = document.getElementById("list");
    list.innerHTML = "";
    snapshot.forEach(doc => {
        let c = doc.data();
        list.innerHTML += <p><b>${c.name}</b>: ${c.text}</p>;
    });
});
</script>

</body>
</html>
