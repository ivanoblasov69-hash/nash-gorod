<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Наш Город — Жалобы</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f4f6f9;
}

header {
    background: #2c3e50;
    color: white;
    text-align: center;
    padding: 25px;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

.card {
    background: white;
    padding: 20px;
    margin-bottom: 20px;
    border-radius: 10px;
}

input, textarea, select {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
}

button {
    background: #1abc9c;
    color: white;
    padding: 10px 15px;
    border: none;
    cursor: pointer;
}

.complaint {
    border-left: 5px solid #1abc9c;
    margin-top: 10px;
    padding: 10px;
    background: #fafafa;
}

img {
    max-width: 100%;
    margin-top: 10px;
}
</style>
</head>

<body>

<header>
    <h1>Портал жалоб — Наш Город</h1>
</header>

<div class="container">

<div class="card">
    <h2>Оставить жалобу</h2>

    <input type="text" id="name" placeholder="Ваше имя">

    <input type="text" id="address" placeholder="Адрес">
    
    <select id="category">
        <option>Дороги</option>
        <option>Мусор</option>
        <option>Освещение</option>
        <option>Дворы</option>
        <option>Транспорт</option>
        <option>Другое</option>
    </select>

    <textarea id="text" placeholder="Опишите проблему"></textarea>

    <input type="file" id="photo">

    <button onclick="addComplaint()">Отправить</button>
</div>

<div class="card">
    <h2>Жалобы</h2>
    <div id="list"></div>
</div>

</div>

<!-- Google Form -->
<iframe name="hidden_iframe" style="display:none;"></iframe>

<form id="googleForm"
action="https://docs.google.com/forms/d/e/1FAIpQLSdMijyL4ifha4IZ9jiJHurdkC317Dk772dtZd09KcBR9fAzsQ/formResponse"
method="POST"
target="hidden_iframe">

<input type="hidden" name="entry.1947460805" id="form-name">
<input type="hidden" name="entry.1372373083" id="form-category">
<input type="hidden" name="entry.1699770815" id="form-text">

</form>

<script>

let complaints = JSON.parse(localStorage.getItem("complaints")) || [];

function render() {
    let list = document.getElementById("list");
    list.innerHTML = "";

    complaints.forEach(c => {
        list.innerHTML += `
        <div class="complaint">
            <strong>${c.name}</strong><br>
            📍 ${c.address}<br>
            ${c.category}<br>
            ${c.text}
            ${c.photo ? <img src="${c.photo}"> : ""}
        </div>
        `;
    });
}

function addComplaint() {
    let name = document.getElementById("name").value;
    let category = document.getElementById("category").value;
    let text = document.getElementById("text").value;
    let address = document.getElementById("address").value;

    let file = document.getElementById("photo").files[0];
    let photoURL = "";

    if (file) {
        photoURL = URL.createObjectURL(file);
    }

    if (!text) {
        alert("Напишите жалобу!");
        return;
    }

    document.getElementById("form-name").value = name;
    document.getElementById("form-category").value = category;
    document.getElementById("form-text").value = text;

    document.getElementById("googleForm").submit();

    complaints.push({name, category, text, address, photo: photoURL});
    localStorage.setItem("complaints", JSON.stringify(complaints));

    render();

    alert("Жалоба отправлена!");
}

render();

</script>

</body>
</html>
